name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Locate package.json
        id: pkg
        run: |
          if   [ -f package.json ];          then echo "dir=." >> $GITHUB_OUTPUT
          elif [ -f backend/package.json ];  then echo "dir=backend" >> $GITHUB_OUTPUT
          elif [ -f profilesapp/package.json ]; then echo "dir=profilesapp" >> $GITHUB_OUTPUT
          else echo "dir=" >> $GITHUB_OUTPUT
          fi

      - name: Install
        if: steps.pkg.outputs.dir != ''
        run: |
          cd ${{ steps.pkg.outputs.dir }}
          npm ci || npm install

      - name: Lint (best-effort)
        if: steps.pkg.outputs.dir != ''
        continue-on-error: true
        run: |
          cd ${{ steps.pkg.outputs.dir }}
          npm run lint --if-present || true

      - name: Test (best-effort)
        if: steps.pkg.outputs.dir != ''
        run: |
          cd ${{ steps.pkg.outputs.dir }}
          npm test --if-present || echo "no tests"

      - name: Build (best-effort)
        if: steps.pkg.outputs.dir != ''
        run: |
          cd ${{ steps.pkg.outputs.dir }}
          npm run build --if-present || echo "no build script"

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Locate Dockerfile
        id: dockerfile
        run: |
          if   [ -f Dockerfile ];         then echo "path=Dockerfile"        >> $GITHUB_OUTPUT
          elif [ -f deploy/Dockerfile ];  then echo "path=deploy/Dockerfile" >> $GITHUB_OUTPUT
          else echo "path=" >> $GITHUB_OUTPUT
          fi

      - name: Skip if no Dockerfile
        if: steps.dockerfile.outputs.path == ''
        run: echo "::notice::No Dockerfile found — skipping image build."

      - name: Set up Buildx
        if: steps.dockerfile.outputs.path != ''
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.dockerfile.outputs.path != ''
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        if: steps.dockerfile.outputs.path != ''
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ steps.dockerfile.outputs.path }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
